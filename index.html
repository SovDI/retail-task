<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дашборд заказов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background-color: #f4f7f6; }
        .container { width: 90%; max-width: 900px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>График заказов (Supabase)</h1>
    <div class="container">
        <canvas id="ordersChart"></canvas>
    </div>

    <script>
        // ИСПРАВЛЕНО: Убрана лишняя 'u' в URL
        const SUPABASE_URL = "https://fkloidqsfuicnmrwhyri.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrbG9pZHFzZnVpY25tcndoeXJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwOTMzNDQsImV4cCI6MjA5MTY2OTM0NH0.Vpy20WeDapEHa0OLKDc3TynrTTkGj3xFKVuJbzW2h2I";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function drawChart() {
            const { data, error } = await _supabase
                .from('orders')
                .select('order_number, total_sum')
                .order('id', { ascending: true });

            if (error) {
                console.error("Ошибка Supabase:", error.message);
                return;
            }

            console.log("Данные получены:", data);

            const ctx = document.getElementById('ordersChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(o => o.order_number),
                    datasets: [{
                        label: 'Сумма (₸)',
                        data: data.map(o => o.total_sum),
                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                        borderWidth: 1
                    }]
                }
            });
        }
        drawChart();
    </script>
</body>
</html>
